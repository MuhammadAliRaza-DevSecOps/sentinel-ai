# docker-compose.prod.yml
# Production ke liye compose file
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # Production mein Nginx add karo frontend pe
  nginx:
    image: nginx:1.25-alpine
    container_name: devsecops_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - dashboard
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

  api:
    image: ghcr.io/yourusername/devsecops-pipeline-orchestrator:latest
    restart: always
    environment:
      - PYTHONOPTIMIZE=1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  dashboard:
    image: ghcr.io/yourusername/devsecops-pipeline-orchestrator:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    restart: always
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # Production mein strong password

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000

volumes:
  postgres_prod_data:
  nginx_logs: