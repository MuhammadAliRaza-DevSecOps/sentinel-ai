# .github/workflows/codeql-analysis.yml
# CodeQL — GitHub ka free automatic security scanner
# Har push pe automatically Python code scan karta hai
# Results GitHub Security tab mein dikhte hain

name: 🔐 CodeQL Security Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    # Har Sunday raat 2 baje automatic scan
    - cron: '0 2 * * 0'

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    
    permissions:
      actions: read
      contents: read
      security-events: write  # Security results upload karne ke liye

    strategy:
      fail-fast: false
      matrix:
        language: ['python']  # Hamara project Python hai

    steps:
      # Step 1: Code download karo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: CodeQL tools setup karo
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extra security queries use karo
          queries: +security-extended,security-and-quality

      # Step 3: Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 4: Dependencies install karo
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: CodeQL scan chalaao
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"