# docker/nginx.conf
# Nginx reverse proxy — production mein FastAPI ke aage lagta hai
# Nginx kya karta hai:
# - SSL termination (HTTPS handle karta hai)
# - Load balancing
# - Static files serve karta hai
# - Rate limiting
# - Security headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ─────────────────────────────────────────────
    # Rate Limiting — DDoS protection
    # ─────────────────────────────────────────────
    # 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 100 requests per minute per IP for scan endpoints
    limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=100r/m;

    # ─────────────────────────────────────────────
    # Upstream servers
    # ─────────────────────────────────────────────
    upstream fastapi_backend {
        # Docker Compose mein service name = hostname
        server api:8000;
        keepalive 32;
    }

    upstream streamlit_dashboard {
        server dashboard:8501;
    }

    # ─────────────────────────────────────────────
    # Main server block
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Security headers — hacker info leakage rokta hai
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # Server version hide karo — attackers ko OS info nahi dena
        server_tokens off;

        # Client body size limit — large payloads block
        client_max_body_size 10M;

        # ─────────────────────────────────────────────
        # API routes → FastAPI
        # ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — slow scans ke liye
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # FastAPI docs
        location /docs {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://fastapi_backend;
            access_log off;  # Health checks log nahi karein
        }

        # ─────────────────────────────────────────────
        # Dashboard → Streamlit
        # ─────────────────────────────────────────────
        location / {
            proxy_pass http://streamlit_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Streamlit WebSocket support
            proxy_read_timeout 86400s;
        }

        # Block common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~* \.(git|env|bak|sql|conf)$ {
            deny all;
            return 404;
        }
    }
}